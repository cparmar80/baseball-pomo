<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a3a2a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PomoBall" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>PomoBall</title>
    <style>
      /* Orientation lock: in landscape, rotate #root back to portrait and size it to fill the screen */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      @media screen and (orientation: landscape) {
        body {
          /* Swap axes */
          width: 100vh;
          height: 100vw;
          /* Rotate counter-clockwise back to portrait */
          transform: rotate(-90deg);
          transform-origin: top left;
          /* Shift down by full viewport width so it stays on screen */
          position: fixed;
          top: 100vw;
          left: 0;
          overflow: hidden;
        }
      }
    </style>
    <script>
      // Use Screen Orientation API where supported (Android Chrome, installed PWA)
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('portrait').catch(() => {});
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
